<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EAF2FA">
<title>hubs</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          sky: '#EAF2FA',
          surface: '#FFFFFF',
          hairline: '#D3E3F2',
          ink: '#16233A',
          muted: '#5E7290',
          work: '#2F6FA8',
          personal: '#B98A4E',
          james: '#3F8F6C',
          family: '#8496AF'
        },
        fontFamily: {
          sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Segoe UI', 'sans-serif']
        }
      }
    }
  }
</script>
<style>
  body { -webkit-tap-highlight-color: transparent; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  .status-dot { animation: pulse-dot 2.4s ease-in-out infinite; }
</style>
</head>
<body class="bg-sky text-ink font-sans min-h-screen">
  <div class="mx-auto max-w-md px-6"
       style="padding-top: max(3rem, env(safe-area-inset-top)); padding-bottom: max(2rem, env(safe-area-inset-bottom));">

    <header class="mb-10 flex items-start justify-between">
      <div>
        <p class="text-[11px] font-medium uppercase tracking-[0.18em] text-muted mb-2">daily hubs</p>
        <h1 id="greeting" class="text-2xl font-semibold tracking-tight text-ink">good morning</h1>
        <p id="date" class="text-sm text-muted mt-1"></p>
      </div>
      <span class="mt-2 h-2 w-2 rounded-full bg-work status-dot"></span>
    </header>

    <nav class="flex flex-col gap-3">

      <a href="https://script.google.com/macros/s/AKfycbxnQUnCRGJgU0ablXdEHE-FlBFk7UCPbS3YsOSSXm3pyTEMeFsWOL5Zkn7dF-HuzkMY/exec"
         target="_blank" rel="noopener"
         class="group relative flex items-center gap-4 rounded-2xl bg-surface border border-hairline shadow-sm shadow-[#2F6FA8]/[0.06] px-5 py-4 active:scale-[0.98] transition-transform">
        <span class="absolute left-0 top-3 bottom-3 w-[3px] rounded-full bg-personal"></span>
        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-personal/10 text-personal font-semibold text-sm">p</span>
        <span class="flex-1">
          <span class="block text-base font-medium text-ink">personal</span>
          <span class="block text-xs text-muted mt-0.5">jason only</span>
        </span>
        <svg class="h-4 w-4 text-muted/60 group-active:translate-x-0.5 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>

      <a href="https://script.google.com/macros/s/AKfycbwpsPDTpF5eJcwvmpiOxbJNP0q6llK3gzgsgE4NF23GHv-h4ASEqYySq9XFmzavvdDb/exec"
         target="_blank" rel="noopener"
         class="group relative flex items-center gap-4 rounded-2xl bg-surface border border-hairline shadow-sm shadow-[#2F6FA8]/[0.06] px-5 py-4 active:scale-[0.98] transition-transform">
        <span class="absolute left-0 top-3 bottom-3 w-[3px] rounded-full bg-james"></span>
        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-james/10 text-james font-semibold text-sm">j</span>
        <span class="flex-1">
          <span class="block text-base font-medium text-ink">james</span>
          <span class="block text-xs text-muted mt-0.5">g-james · g-bg</span>
        </span>
        <svg class="h-4 w-4 text-muted/60 group-active:translate-x-0.5 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>

      <a href="https://script.google.com/macros/s/AKfycbxXeM-PiIg1GbU8WGE4BUomUc5WrfXhuqIOmJf3wukfimCY0Tw-EsjoW1XHTESDFyCcGg/exec"
         target="_blank" rel="noopener"
         class="group relative flex items-center gap-4 rounded-2xl bg-surface border border-hairline shadow-sm shadow-[#2F6FA8]/[0.06] px-5 py-4 active:scale-[0.98] transition-transform">
        <span class="absolute left-0 top-3 bottom-3 w-[3px] rounded-full bg-work"></span>
        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-work/10 text-work font-semibold text-sm">w</span>
        <span class="flex-1">
          <span class="block text-base font-medium text-ink">work</span>
          <span class="block text-xs text-muted mt-0.5">todo · list · records · creq</span>
        </span>
        <svg class="h-4 w-4 text-muted/60 group-active:translate-x-0.5 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>

      <div class="relative flex items-center gap-4 rounded-2xl border border-dashed border-hairline px-5 py-4 opacity-60">
        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-family/10 text-family font-semibold text-sm">f</span>
        <span class="flex-1">
          <span class="block text-base font-medium text-ink">family</span>
          <span class="block text-xs text-muted mt-0.5">add url when deployed</span>
        </span>
      </div>

    </nav>
  </div>

  <script>
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'good morning' : hour < 17 ? 'good afternoon' : 'good evening';
    document.getElementById('greeting').textContent = greeting;
    document.getElementById('date').textContent = new Date().toLocaleDateString(undefined, {
      weekday: 'long', month: 'long', day: 'numeric'
    }).toLowerCase();
  </script>
</body>
</html>
